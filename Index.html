<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cleaning Log - Praveen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#172033;
  padding:16px;
}
.app{max-width:1200px;margin:auto}
.header{text-align:center;color:white;margin:14px 0 22px}
.header h1{font-size:32px}
.header p{opacity:.9}
.card{
  background:rgba(255,255,255,.95);
  border-radius:22px;
  padding:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.16);
  margin-bottom:18px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}
.stat{
  color:white;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#43cea2,#185a9d);
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
.stat:nth-child(2){background:linear-gradient(135deg,#ff9966,#ff5e62)}
.stat:nth-child(3){background:linear-gradient(135deg,#36d1dc,#5b86e5)}
.stat:nth-child(4){background:linear-gradient(135deg,#f7971e,#ffd200)}
.stat h3{font-size:14px;font-weight:600;opacity:.95}
.stat strong{font-size:30px;display:block;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
label{font-weight:700;font-size:14px;margin-bottom:6px;display:block}
input,select,textarea{
  width:100%;
  padding:13px;
  border:1px solid #d7ddea;
  border-radius:14px;
  font-size:15px;
  background:white;
}
textarea{min-height:90px;resize:vertical}
button{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
  background:#172033;
  color:white;
}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2)}
.btn-danger{background:#e74c3c}
.btn-light{background:#eef2ff;color:#172033}
.btn-green{background:#10b981}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.rooms,.workers,.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.choice{
  background:#f1f5f9;
  color:#172033;
  border:2px solid transparent;
}
.choice.active{
  background:#667eea;
  color:white;
  border-color:#4f46e5;
}
.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}
.hidden{display:none!important}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px;vertical-align:top}
th{background:#f8fafc}
.tab{background:#eef2ff;color:#172033}
.tab.active{background:#172033;color:white}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.day-name{text-align:center;font-weight:800;color:#475569;padding:8px}
.day{
  min-height:85px;
  background:#f8fafc;
  border-radius:14px;
  padding:8px;
  border:1px solid #e5e7eb;
}
.day.work{background:#dcfce7;border-color:#22c55e}
.day small{display:block;color:#64748b;margin-top:5px}
.summary-row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:14px;
  background:#f8fafc;
  margin-bottom:8px;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:99;
}
.modal-box{
  background:white;
  width:100%;
  max-width:560px;
  max-height:90vh;
  overflow:auto;
  border-radius:24px;
  padding:22px;
}
.room-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  margin-bottom:10px;
}
.footer-note{text-align:center;color:white;opacity:.8;margin:20px 0}
@media(max-width:800px){
  body{padding:10px}
  .stats,.grid{grid-template-columns:1fr}
  .header h1{font-size:26px}
  .stat strong{font-size:26px}
  .card{padding:16px;border-radius:18px}
  .section-title{align-items:flex-start;flex-direction:column}
  .calendar{gap:5px}
  .day{min-height:70px;font-size:12px}
}
@media print{
  body{background:white;color:black}
  .form-card,.tabs,.actions,.modal,.footer-note{display:none!important}
  .card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Cleaning Log</h1>
    <p>B&B daily work tracker for Praveen</p>
  </div>

  <div class="stats">
    <div class="stat"><h3>Total Hours</h3><strong id="totalHours">0</strong></div>
    <div class="stat"><h3>Total Rooms Cleaned</h3><strong id="totalRooms">0</strong></div>
    <div class="stat"><h3>Jacapo Total Hours</h3><strong id="jacapoHours">0</strong></div>
    <div class="stat"><h3>Society Total Hours</h3><strong id="societyHours">0</strong></div>
  </div>

  <div class="card form-card">
    <div class="section-title">
      <h2>Add Cleaning Entry</h2>
      <button class="btn-light" onclick="openRoomModal()">Manage Rooms</button>
    </div>

    <form id="entryForm">
      <div class="grid">
        <div>
          <label>Date</label>
          <input type="date" id="date" required>
        </div>
        <div>
          <label>Select B&B</label>
          <select id="bnb">
            <option value="jacapo">Jacapo</option>
            <option value="society">Society</option>
          </select>
        </div>
        <div>
          <label>Start Time Optional</label>
          <input type="time" id="startTime">
        </div>
        <div>
          <label>End Time Optional</label>
          <input type="time" id="endTime">
        </div>
        <div>
          <label>Manual Hours</label>
          <input type="number" id="manualHours" min="0" step="0.25" placeholder="Example: 3.5">
        </div>
        <div>
          <label>Worker Count</label>
          <div class="workers" id="workerButtons"></div>
        </div>
      </div>

      <div style="margin-top:14px">
        <label>Rooms Cleaned</label>
        <div class="rooms" id="roomButtons"></div>
      </div>

      <div id="workerNamesBox" style="margin-top:14px" class="hidden">
        <label>Worker Names Required</label>
        <input type="text" id="workerNames" placeholder="Example: Praveen, Ramesh">
      </div>

      <div style="margin-top:14px">
        <label>Notes Optional</label>
        <textarea id="notes" placeholder="Any extra note..."></textarea>
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary">Save Entry</button>
        <button type="button" onclick="exportCSV()" class="btn-green">Export CSV</button>
        <button type="button" onclick="window.print()" class="btn-light">Print</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>History</h2>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('list',this)">List View</button>
        <button class="tab" onclick="switchTab('calendar',this)">Calendar View</button>
        <button class="tab" onclick="switchTab('weekly',this)">Weekly Summary</button>
        <button class="tab" onclick="switchTab('monthly',this)">Monthly Summary</button>
      </div>
    </div>

    <div id="listView" class="view"></div>
    <div id="calendarView" class="view hidden"></div>
    <div id="weeklyView" class="view hidden"></div>
    <div id="monthlyView" class="view hidden"></div>
  </div>

  <div class="footer-note">Ready for Netlify or GitHub Pages</div>
</div>

<div id="roomModal" class="modal hidden">
  <div class="modal-box">
    <div class="section-title">
      <h2>Manage Rooms</h2>
      <button class="btn-danger" onclick="closeRoomModal()">Close</button>
    </div>
    <label>Select B&B</label>
    <select id="roomManageBnb" onchange="renderRoomManager()">
      <option value="jacapo">Jacapo</option>
      <option value="society">Society</option>
    </select>

    <div id="roomManagerList" style="margin-top:16px"></div>

    <div class="actions">
      <input type="text" id="newRoomName" placeholder="New room name">
      <button onclick="addRoom()" class="btn-primary">Add Room</button>
    </div>
  </div>
</div>

<script>
const ENTRY_KEY = "cleaning_entries_praveen";
const ROOM_KEY = "cleaning_rooms_praveen";

let entries = JSON.parse(localStorage.getItem(ENTRY_KEY)) || [];
let rooms = JSON.parse(localStorage.getItem(ROOM_KEY)) || {
  jacapo: ["Vohé", "Nohé", "Béy", "New"],
  society: ["Santa Croce", "Rooms", "Near Big", "Palazzo"]
};

let selectedRooms = [];
let workerCount = 1;
let activeTab = "list";

const $ = id => document.getElementById(id);

function saveEntries(){localStorage.setItem(ENTRY_KEY, JSON.stringify(entries))}
function saveRooms(){localStorage.setItem(ROOM_KEY, JSON.stringify(rooms))}

function todayISO(){
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().split("T")[0];
}

function formatHours(n){
  return Number(n || 0).toFixed(2).replace(/\.00$/,"");
}

function calculateHours(start,end){
  const [sh,sm] = start.split(":").map(Number);
  const [eh,em] = end.split(":").map(Number);
  let startMin = sh * 60 + sm;
  let endMin = eh * 60 + em;
  if(endMin < startMin) endMin += 1440;
  return (endMin - startMin) / 60;
}

function renderWorkerButtons(){
  $("workerButtons").innerHTML = "";
  [1,2,3].forEach(num=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = num;
    btn.className = "choice" + (workerCount === num ? " active" : "");
    btn.onclick = () => {
      workerCount = num;
      $("workerNamesBox").classList.toggle("hidden", workerCount === 1);
      renderWorkerButtons();
    };
    $("workerButtons").appendChild(btn);
  });
}

function renderRoomButtons(){
  const bnb = $("bnb").value;
  selectedRooms = selectedRooms.filter(r => rooms[bnb].includes(r));
  $("roomButtons").innerHTML = "";

  if(!rooms[bnb].length){
    $("roomButtons").innerHTML = "<p>No rooms added. Click Manage Rooms.</p>";
    return;
  }

  rooms[bnb].forEach(room=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = room;
    btn.className = "choice" + (selectedRooms.includes(room) ? " active" : "");
    btn.onclick = () => {
      selectedRooms.includes(room)
        ? selectedRooms = selectedRooms.filter(r => r !== room)
        : selectedRooms.push(room);
      renderRoomButtons();
    };
    $("roomButtons").appendChild(btn);
  });
}

function openRoomModal(){
  $("roomManageBnb").value = $("bnb").value;
  $("roomModal").classList.remove("hidden");
  renderRoomManager();
}

function closeRoomModal(){
  $("roomModal").classList.add("hidden");
  renderRoomButtons();
}

function renderRoomManager(){
  const bnb = $("roomManageBnb").value;
  const box = $("roomManagerList");
  box.innerHTML = "";

  rooms[bnb].forEach((room,index)=>{
    const row = document.createElement("div");
    row.className = "room-row";

    const input = document.createElement("input");
    input.value = room;

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "Save";
    saveBtn.className = "btn-green";
    saveBtn.onclick = () => {
      const name = input.value.trim();
      if(!name) return alert("Room name cannot be empty.");
      rooms[bnb][index] = name;
      saveRooms();
      renderRoomManager();
      renderRoomButtons();
    };

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.className = "btn-danger";
    delBtn.onclick = () => {
      if(confirm("Delete this room?")){
        rooms[bnb].splice(index,1);
        saveRooms();
        renderRoomManager();
        renderRoomButtons();
      }
    };

    row.append(input,saveBtn,delBtn);
    box.appendChild(row);
  });
}

function addRoom(){
  const bnb = $("roomManageBnb").value;
  const name = $("newRoomName").value.trim();
  if(!name) return alert("Enter room name.");
  if(rooms[bnb].includes(name)) return alert("Room already exists.");
  rooms[bnb].push(name);
  $("newRoomName").value = "";
  saveRooms();
  renderRoomManager();
  renderRoomButtons();
}

function saveEntry(e){
  e.preventDefault();

  const date = $("date").value;
  const startTime = $("startTime").value;
  const endTime = $("endTime").value;
  const manual = Number($("manualHours").value);
  const bnb = $("bnb").value;
  const workerNames = $("workerNames").value.trim();

  let hours = 0;

  if(manual){
    if(manual <= 0) return alert("Manual hours must be greater than 0.");
    hours = manual;
  } else if(startTime && endTime){
    hours = calculateHours(startTime,endTime);
    if(hours <= 0) return alert("Invalid start and end time.");
  } else {
    return alert("Enter either Manual Hours OR Start & End Time.");
  }

  if(selectedRooms.length === 0) return alert("Select at least one room.");
  if(workerCount > 1 && !workerNames) return alert("Worker names are required when worker count is more than 1.");

  const entry = {
    id: Date.now(),
    date,
    startTime,
    endTime,
    hours,
    bnb,
    rooms: [...selectedRooms],
    workerCount,
    workerNames: workerCount === 1 ? "" : workerNames,
    notes: $("notes").value.trim()
  };

  entries.unshift(entry);
  saveEntries();
  resetForm();
  renderAll();
}

function resetForm(){
  $("entryForm").reset();
  $("date").value = todayISO();
  selectedRooms = [];
  workerCount = 1;
  $("workerNamesBox").classList.add("hidden");
  renderWorkerButtons();
  renderRoomButtons();
}

function deleteEntry(id){
  if(confirm("Delete this entry?")){
    entries = entries.filter(e => e.id !== id);
    saveEntries();
    renderAll();
  }
}

function entryText(e){
  return `Cleaning Log
Date: ${e.date}
Time: ${e.startTime || "-"} to ${e.endTime || "-"}
B&B: ${title(e.bnb)}
Rooms: ${e.rooms.join(", ")}
Hours: ${formatHours(e.hours)}
Workers: ${e.workerCount}
Worker Names: ${e.workerNames || "-"}
Notes: ${e.notes || "-"}`;
}

async function shareEntry(id){
  const e = entries.find(x => x.id === id);
  const text = entryText(e);

  if(navigator.share){
    await navigator.share({title:"Cleaning Log",text}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(text);
    alert("Entry copied to clipboard.");
  }
}

function title(str){return str.charAt(0).toUpperCase() + str.slice(1)}

function renderStats(){
  const totalHours = entries.reduce((s,e)=>s+Number(e.hours),0);
  const totalRooms = entries.reduce((s,e)=>s+e.rooms.length,0);
  const jacapo = entries.filter(e=>e.bnb==="jacapo").reduce((s,e)=>s+Number(e.hours),0);
  const society = entries.filter(e=>e.bnb==="society").reduce((s,e)=>s+Number(e.hours),0);

  $("totalHours").textContent = formatHours(totalHours);
  $("totalRooms").textContent = totalRooms;
  $("jacapoHours").textContent = formatHours(jacapo);
  $("societyHours").textContent = formatHours(society);
}

function renderList(){
  if(!entries.length){
    $("listView").innerHTML = "<p>No cleaning entries yet.</p>";
    return;
  }

  $("listView").innerHTML = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Time</th><th>B&B</th><th>Rooms</th><th>Hours</th>
          <th>Worker Count</th><th>Worker Names</th><th>Notes</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${entries.map(e=>`
          <tr>
            <td>${e.date}</td>
            <td>${e.startTime || "-"} ${e.endTime ? "to " + e.endTime : ""}</td>
            <td>${title(e.bnb)}</td>
            <td>${e.rooms.join(", ")}</td>
            <td>${formatHours(e.hours)}</td>
            <td>${e.workerCount}</td>
            <td>${e.workerNames || "-"}</td>
            <td>${e.notes || "-"}</td>
            <td>
              <button class="btn-light" onclick="shareEntry(${e.id})">Share</button>
              <button class="btn-danger" onclick="deleteEntry(${e.id})">Delete</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderCalendar(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const first = new Date(year,month,1);
  const last = new Date(year,month+1,0);
  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  let html = `<h3>${first.toLocaleString("default",{month:"long"})} ${year}</h3><br><div class="calendar">`;
  dayNames.forEach(d => html += `<div class="day-name">${d}</div>`);

  for(let i=0;i<first.getDay();i++) html += `<div></div>`;

  for(let d=1;d<=last.getDate();d++){
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const hours = entries.filter(e=>e.date===iso).reduce((s,e)=>s+Number(e.hours),0);
    html += `<div class="day ${hours ? "work" : ""}">
      <strong>${d}</strong>
      ${hours ? `<small>${formatHours(hours)} hrs</small>` : ""}
    </div>`;
  }

  html += "</div>";
  $("calendarView").innerHTML = html;
}

function getWeekDates(){
  const now = new Date();
  const day = now.getDay();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - day);

  return Array.from({length:7},(_,i)=>{
    const d = new Date(sunday);
    d.setDate(sunday.getDate()+i);
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().split("T")[0];
  });
}

function renderWeekly(){
  const dates = getWeekDates();
  let total = 0;

  let html = "<h3>Current Week</h3><br>";
  dates.forEach(date=>{
    const h = entries.filter(e=>e.date===date).reduce((s,e)=>s+Number(e.hours),0);
    total += h;
    html += `<div class="summary-row"><span>${date}</span><strong>${formatHours(h)} hrs</strong></div>`;
  });
  html += `<div class="summary-row"><span>Total Week Hours</span><strong>${formatHours(total)} hrs</strong></div>`;
  $("weeklyView").innerHTML = html;
}

function renderMonthly(){
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const monthEntries = entries.filter(e=>e.date.startsWith(ym));
  const totalHours = monthEntries.reduce((s,e)=>s+Number(e.hours),0);
  const totalRooms = monthEntries.reduce((s,e)=>s+e.rooms.length,0);
  const daysWorked = new Set(monthEntries.map(e=>e.date)).size;
  const jacapo = monthEntries.filter(e=>e.bnb==="jacapo").reduce((s,e)=>s+Number(e.hours),0);
  const society = monthEntries.filter(e=>e.bnb==="society").reduce((s,e)=>s+Number(e.hours),0);

  $("monthlyView").innerHTML = `
    <h3>Monthly Summary</h3><br>
    <div class="summary-row"><span>Total Hours</span><strong>${formatHours(totalHours)}</strong></div>
    <div class="summary-row"><span>Total Rooms</span><strong>${totalRooms}</strong></div>
    <div class="summary-row"><span>Days Worked</span><strong>${daysWorked}</strong></div>
    <div class="summary-row"><span>Jacapo Hours</span><strong>${formatHours(jacapo)}</strong></div>
    <div class="summary-row"><span>Society Hours</span><strong>${formatHours(society)}</strong></div>
  `;
}

function switchTab(tab,btn){
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));
  $(tab + "View").classList.remove("hidden");
  renderAll();
}

function exportCSV(){
  const rows = [
    ["Date","Start Time","End Time","B&B","Rooms","Hours","Worker Count","Worker Names","Notes"],
    ...entries.map(e=>[
      e.date,e.startTime,e.endTime,title(e.bnb),e.rooms.join(" | "),e.hours,e.workerCount,e.workerNames,e.notes
    ])
  ];

  const csv = rows.map(r=>r.map(v=>`"${String(v ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "cleaning-log.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function renderAll(){
  renderStats();
  renderList();
  renderCalendar();
  renderWeekly();
  renderMonthly();
}

$("entryForm").addEventListener("submit", saveEntry);
$("bnb").addEventListener("change", renderRoomButtons);

$("date").value = todayISO();
renderW
