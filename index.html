<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cleaning Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:14px;color:#111827}
.app{max-width:1100px;margin:auto}
.header{text-align:center;color:#fff;margin:15px 0 20px}
.card{background:#fff;border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 12px 35px #0003}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat{padding:18px;border-radius:20px;color:#fff;background:linear-gradient(135deg,#43cea2,#185a9d);box-shadow:0 8px 22px #0003}
.stat:nth-child(2){background:linear-gradient(135deg,#ff9966,#ff5e62)}
.stat:nth-child(3){background:linear-gradient(135deg,#36d1dc,#5b86e5)}
.stat:nth-child(4){background:linear-gradient(135deg,#f7971e,#ffd200)}
.stat h3{font-size:14px}
.stat b{font-size:28px;display:block;margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
label{font-weight:800;font-size:14px;display:block;margin-bottom:6px}
input,select,textarea{width:100%;padding:13px;border:1px solid #ddd;border-radius:14px;font-size:15px;background:#fff}
textarea{min-height:85px}
button{border:0;border-radius:14px;padding:12px 15px;font-weight:800;cursor:pointer;background:#111827;color:#fff}
.btn{background:linear-gradient(135deg,#667eea,#764ba2)}
.light{background:#eef2ff;color:#111827}
.red{background:#ef4444}
.green{background:#10b981}
.row,.rooms,.workers,.tabs{display:flex;gap:9px;flex-wrap:wrap;margin-top:8px}
.choice{background:#f1f5f9;color:#111827}
.choice.active{background:#667eea;color:#fff}
.section{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
.hidden{display:none!important}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:850px}
th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}
th{background:#f8fafc}
.tab{background:#eef2ff;color:#111827}
.tab.active{background:#111827;color:#fff}
.summary{display:flex;justify-content:space-between;background:#f8fafc;padding:12px;border-radius:14px;margin:8px 0}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.day,.dayname{background:#f8fafc;border-radius:12px;padding:8px;min-height:70px}
.dayname{min-height:auto;text-align:center;font-weight:900}
.day.work{background:#dcfce7;border:1px solid #22c55e}
.modal{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;padding:14px;z-index:99}
.box{background:#fff;border-radius:22px;padding:18px;max-width:620px;width:100%;max-height:90vh;overflow:auto}
.manage-row{display:grid;grid-template-columns:1fr auto auto;gap:7px;margin:9px 0}
.small{font-size:13px;color:#64748b}
@media(max-width:750px){.grid{grid-template-columns:1fr}.section{flex-direction:column;align-items:flex-start}.card{padding:15px}.header h1{font-size:26px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Cleaning Log</h1>
    <p>B&B daily work tracker for Praveen</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <div class="section">
      <h2>Add Cleaning Entry</h2>
      <button class="light" onclick="openBnbModal()">Manage B&B / Rooms</button>
    </div>

    <form id="form">
      <div class="grid">
        <div>
          <label>Date</label>
          <input type="date" id="date" required>
        </div>
        <div>
          <label>Select B&B</label>
          <select id="bnb"></select>
        </div>
        <div>
          <label>Start Time Optional</label>
          <input type="time" id="start">
        </div>
        <div>
          <label>End Time Optional</label>
          <input type="time" id="end">
        </div>
        <div>
          <label>Manual Hours</label>
          <input type="number" id="manual" min="0" step="0.25" placeholder="Example: 3.5">
        </div>
        <div>
          <label>Worker Count</label>
          <div class="workers" id="workers"></div>
        </div>
      </div>

      <div style="margin-top:14px">
        <label>Rooms Cleaned</label>
        <div class="rooms" id="rooms"></div>
      </div>

      <div id="namesBox" class="hidden" style="margin-top:14px">
        <label>Worker Names Required</label>
        <input id="names" placeholder="Example: Praveen, Ramesh">
      </div>

      <div style="margin-top:14px">
        <label>Notes Optional</label>
        <textarea id="notes" placeholder="Any extra note..."></textarea>
      </div>

      <div class="row">
        <button class="btn" type="submit">Save Entry</button>
        <button type="button" class="green" onclick="exportCSV()">Export CSV</button>
        <button type="button" class="light" onclick="window.print()">Print</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="section">
      <h2>History</h2>
      <div class="tabs">
        <button class="tab active" onclick="showTab('list',this)">List View</button>
        <button class="tab" onclick="showTab('calendar',this)">Calendar View</button>
        <button class="tab" onclick="showTab('weekly',this)">Weekly Summary</button>
        <button class="tab" onclick="showTab('monthly',this)">Monthly Summary</button>
      </div>
    </div>
    <div id="listView"></div>
    <div id="calendarView" class="hidden"></div>
    <div id="weeklyView" class="hidden"></div>
    <div id="monthlyView" class="hidden"></div>
  </div>
</div>

<div id="bnbModal" class="modal hidden">
  <div class="box">
    <div class="section">
      <h2>Manage B&B / Rooms</h2>
      <button class="red" onclick="closeBnbModal()">Close</button>
    </div>

    <label>Add New B&B</label>
    <div class="row">
      <input id="newBnb" placeholder="Example: New Hotel">
      <button class="btn" onclick="addBnb()">Add B&B</button>
    </div>

    <hr style="margin:18px 0">

    <label>Select B&B to Manage</label>
    <select id="manageBnb" onchange="renderManager()"></select>

    <div style="margin-top:14px">
      <label>Edit B&B Name</label>
      <div class="row">
        <input id="editBnbName">
        <button class="green" onclick="renameBnb()">Save Name</button>
        <button class="red" onclick="deleteBnb()">Delete B&B</button>
      </div>
      <p class="small">Deleting B&B will not delete old history entries, only future room list.</p>
    </div>

    <hr style="margin:18px 0">

    <label>Rooms</label>
    <div id="roomManager"></div>

    <div class="row">
      <input id="newRoom" placeholder="New room name">
      <button class="btn" onclick="addRoom()">Add Room</button>
    </div>
  </div>
</div>

<script>
const EKEY="clean_entries_v3";
const BKEY="clean_bnbs_v3";

let entries=JSON.parse(localStorage.getItem(EKEY))||[];
let bnbs=JSON.parse(localStorage.getItem(BKEY))||[
  {id:"jacapo",name:"Jacapo",rooms:["Vohé","Nohé","Béy","New"]},
  {id:"society",name:"Society",rooms:["Santa Croce","Rooms","Near Big","Palazzo"]}
];

let selectedRooms=[];
let workerCount=1;

const $=id=>document.getElementById(id);

function saveEntries(){localStorage.setItem(EKEY,JSON.stringify(entries))}
function saveBnbs(){localStorage.setItem(BKEY,JSON.stringify(bnbs))}
function uid(){return "b"+Date.now()+Math.random().toString(16).slice(2)}
function today(){
  let d=new Date();
  d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().split("T")[0];
}
function fmt(n){return Number(n||0).toFixed(2).replace(/\.00$/,"")}
function bnbName(id){return (bnbs.find(b=>b.id===id)||{name:id}).name}

function renderBnbSelects(){
  $("bnb").innerHTML=bnbs.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
  $("manageBnb").innerHTML=bnbs.map(b=>`<option value="${b.id}">${b.name}</option>`).join("");
}

function renderStats(){
  let totalH=entries.reduce((s,e)=>s+Number(e.hours),0);
  let totalR=entries.reduce((s,e)=>s+e.rooms.length,0);
  let html=`
    <div class="stat"><h3>Total Hours</h3><b>${fmt(totalH)}</b></div>
    <div class="stat"><h3>Total Rooms Cleaned</h3><b>${totalR}</b></div>
  `;
  bnbs.forEach(b=>{
    let h=entries.filter(e=>e.bnb===b.id).reduce((s,e)=>s+Number(e.hours),0);
    html+=`<div class="stat"><h3>${b.name} Total Hours</h3><b>${fmt(h)}</b></div>`;
  });
  $("stats").innerHTML=html;
}

function renderWorkers(){
  $("workers").innerHTML="";
  [1,2,3].forEach(n=>{
    let btn=document.createElement("button");
    btn.type="button";
    btn.textContent=n;
    btn.className="choice"+(workerCount===n?" active":"");
    btn.onclick=()=>{
      workerCount=n;
      $("namesBox").classList.toggle("hidden",n===1);
      renderWorkers();
    };
    $("workers").appendChild(btn);
  });
}

function renderRooms(){
  let b=bnbs.find(x=>x.id===$("bnb").value);
  $("rooms").innerHTML="";
  selectedRooms=[];
  if(!b||!b.rooms.length){
    $("rooms").innerHTML="<p class='small'>No rooms. Click Manage B&B / Rooms.</p>";
    return;
  }
  b.rooms.forEach(r=>{
    let btn=document.createElement("button");
    btn.type="button";
    btn.textContent=r;
    btn.className="choice";
    btn.onclick=()=>{
      if(selectedRooms.includes(r)){
        selectedRooms=selectedRooms.filter(x=>x!==r);
        btn.classList.remove("active");
      }else{
        selectedRooms.push(r);
        btn.classList.add("active");
      }
    };
    $("rooms").appendChild(btn);
  });
}

function calcHours(s,e){
  let [sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);
  let a=sh*60+sm,b=eh*60+em;
  if(b<a)b+=1440;
  return (b-a)/60;
}

$("form").addEventListener("submit",e=>{
  e.preventDefault();

  let manual=Number($("manual").value);
  let start=$("start").value,end=$("end").value;
  let hours=0;

  if(manual){
    if(manual<=0)return alert("Manual hours must be greater than 0.");
    hours=manual;
  }else if(start&&end){
    hours=calcHours(start,end);
  }else{
    return alert("Enter Manual Hours OR Start & End Time.");
  }

  if(!selectedRooms.length)return alert("Select at least one room.");
  if(workerCount>1&&!$("names").value.trim())return alert("Worker names required.");

  entries.unshift({
    id:Date.now(),
    date:$("date").value,
    startTime:start,
    endTime:end,
    hours,
    bnb:$("bnb").value,
    rooms:[...selectedRooms],
    workerCount,
    workerNames:workerCount===1?"":$("names").value.trim(),
    notes:$("notes").value.trim()
  });

  saveEntries();
  $("form").reset();
  $("date").value=today();
  workerCount=1;
  $("namesBox").classList.add("hidden");
  renderWorkers();
  renderRooms();
  renderAll();
});

function renderList(){
  if(!entries.length){$("listView").innerHTML="<p>No entries yet.</p>";return}
  $("listView").innerHTML=`<div class="table-wrap"><table>
  <thead><tr><th>Date</th><th>Time</th><th>B&B</th><th>Rooms</th><th>Hours</th><th>Workers</th><th>Names</th><th>Notes</th><th>Action</th></tr></thead>
  <tbody>${entries.map(e=>`<tr>
    <td>${e.date}</td>
    <td>${e.startTime||"-"} ${e.endTime?"to "+e.endTime:""}</td>
    <td>${bnbName(e.bnb)}</td>
    <td>${e.rooms.join(", ")}</td>
    <td>${fmt(e.hours)}</td>
    <td>${e.workerCount}</td>
    <td>${e.workerNames||"-"}</td>
    <td>${e.notes||"-"}</td>
    <td><button class="light" onclick="shareEntry(${e.id})">Share</button> <button class="red" onclick="delEntry(${e.id})">Delete</button></td>
  </tr>`).join("")}</tbody></table></div>`;
}

function delEntry(id){
  if(confirm("Delete entry?")){
    entries=entries.filter(e=>e.id!==id);
    saveEntries();renderAll();
  }
}

function shareEntry(id){
  let e=entries.find(x=>x.id===id);
  let text=`Cleaning Log
Date: ${e.date}
B&B: ${bnbName(e.bnb)}
Rooms: ${e.rooms.join(", ")}
Hours: ${fmt(e.hours)}
Workers: ${e.workerCount}
Names: ${e.workerNames||"-"}
Notes: ${e.notes||"-"}`;
  if(navigator.share)navigator.share({title:"Cleaning Log",text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(()=>alert("Copied to clipboard"));
}

function renderCalendar(){
  let n=new Date(),y=n.getFullYear(),m=n.getMonth();
  let first=new Date(y,m,1),last=new Date(y,m+1,0);
  let html=`<h3>${first.toLocaleString("default",{month:"long"})} ${y}</h3><br><div class="calendar">`;
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>html+=`<div class="dayname">${d}</div>`);
  for(let i=0;i<first.getDay();i++)html+="<div></div>";
  for(let d=1;d<=last.getDate();d++){
    let iso=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    let h=entries.filter(e=>e.date===iso).reduce((s,e)=>s+Number(e.hours),0);
    html+=`<div class="day ${h?"work":""}"><b>${d}</b>${h?`<br><small>${fmt(h)} hrs</small>`:""}</div>`;
  }
  $("calendarView").innerHTML=html+"</div>";
}

function renderWeekly(){
  let now=new Date(),sun=new Date(now);sun.setDate(now.getDate()-now.getDay());
  let total=0,html="<h3>Current Week</h3><br>";
  for(let i=0;i<7;i++){
    let d=new Date(sun);d.setDate(sun.getDate()+i);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
    let iso=d.toISOString().split("T")[0];
    let h=entries.filter(e=>e.date===iso).reduce((s,e)=>s+Number(e.hours),0);
    total+=h;
    html+=`<div class="summary"><span>${iso}</span><b>${fmt(h)} hrs</b></div>`;
  }
  html+=`<div class="summary"><span>Total Week Hours</span><b>${fmt(total)} hrs</b></div>`;
  $("weeklyView").innerHTML=html;
}

function renderMonthly(){
  let n=new Date(),ym=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
  let a=entries.filter(e=>e.date.startsWith(ym));
  let h=a.reduce((s,e)=>s+Number(e.hours),0);
  let r=a.reduce((s,e)=>s+e.rooms.length,0);
  let days=new Set(a.map(e=>e.date)).size;
  let html=`<h3>Monthly Summary</h3><br>
  <div class="summary"><span>Total Hours</span><b>${fmt(h)}</b></div>
  <div class="summary"><span>Total Rooms</span><b>${r}</b></div>
  <div class="summary"><span>Days Worked</span><b>${days}</b></div>`;
  bnbs.forEach(b=>{
    let bh=a.filter(e=>e.bnb===b.id).reduce((s,e)=>s+Number(e.hours),0);
    html+=`<div class="summary"><span>${b.name} Hours</span><b>${fmt(bh)}</b></div>`;
  });
  $("monthlyView").innerHTML=html;
}

function showTab(tab,btn){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  ["list","calendar","weekly","monthly"].forEach(v=>$(v+"View").classList.add("hidden"));
  $(tab+"View").classList.remove("hidden");
}

function openBnbModal(){
  $("bnbModal").classList.remove("hidden");
  renderBnbSelects();
  $("manageBnb").value=$("bnb").value;
  renderManager();
}
function closeBnbModal(){
  $("bnbModal").classList.add("hidden");
  renderBnbSelects();renderRooms();renderAll();
}
function renderManager(){
  let b=bnbs.find(x=>x.id===$("manageBnb").value);
  if(!b)return;
  $("editBnbName").value=b.name;
  $("roomManager").innerHTML=b.rooms.map((r,i)=>`
    <div class="manage-row">
      <input value="${r}" id="room_${i}">
      <button class="green" onclick="saveRoom(${i})">Save</button>
      <button class="red" onclick="deleteRoom(${i})">Delete</button>
    </div>`).join("") || "<p class='small'>No rooms added.</p>";
}
function addBnb(){
  let name=$("newBnb").value.trim();
  if(!name)return alert("Enter B&B name.");
  bnbs.push({id:uid(),name,rooms:[]});
  $("newBnb").value="";
  saveBnbs();renderBnbSelects();$("manageBnb").value=bnbs[bnbs.length-1].id;renderManager();
}
function renameBnb(){
  let b=bnbs.find(x=>x.id===$("manageBnb").value);
  let name=$("editBnbName").value.trim();
  if(!name)return alert("Name cannot be empty.");
  b.name=name;saveBnbs();renderBnbSelects();$("manageBnb").value=b.id;renderManager();
}
function deleteBnb(){
  if(bnbs.length<=1)return alert("At least one B&B required.");
  let id=$("manageBnb").value;
  if(confirm("Delete this B&B?")){
    bnbs=bnbs.filter(b=>b.id!==id);
    saveBnbs();renderBnbSelects();renderManager();
  }
}
function addRoom(){
  let b=bnbs.find(x=>x.id===$("manageBnb").value);
  let name=$("newRoom").value.trim();
  if(!name)return alert("Enter room name.");
  b.rooms.push(name);
  $("newRoom").value="";
  saveBnbs();renderManager();
}
function saveRoom(i){
  let b=bnbs.find(x=>x.id===$("manageBnb").value);
  let name=$("room_"+i).value.trim();
  if(!name)return alert("Room name cannot be empty.");
  b.rooms[i]=name;saveBnbs();renderManager();
}
function deleteRoom(i){
  let b=bnbs.find(x=>x.id===$("manageBnb").value);
  if(confirm("Delete room?")){
    b.rooms.splice(i,1);saveBnbs();renderManager();
  }
}

function exportCSV(){
  let rows=[["Date","Start","End","B&B","Rooms","Hours","Worker Count","Names","Notes"],
    ...entries.map(e=>[e.date,e.startTime,e.endTime,bnbName(e.bnb),e.rooms.join("|"),e.hours,e.workerCount,e.workerNames,e.notes])];
  let csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="cleaning-log.csv";
  a.click();
}

function renderAll(){
  renderStats();renderList();renderCalendar();renderWeekly();renderMonthly();
}

$("bnb").addEventListener("change",renderRooms);
$("date").value=today();
renderBnbSelects();
renderWorkers();
renderRooms();
renderAll();
</script>
</body>
  </html>
